<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaMm3r's Unified Tool Hub — Google Antigravity UI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --accent: #4f8ef7;
  --accent2: #a78bfa;
  --glow: rgba(79,142,247,0.25);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Google Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: -0.3px;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px var(--glow);
}

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 520px;
}

.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 9px 18px 9px 40px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}

.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
}

.search-wrap input::placeholder { color: var(--muted); }

.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 15px;
  pointer-events: none;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}

.btn-gravity {
  background: linear-gradient(135deg, #6366f1, #a78bfa);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
  white-space: nowrap;
  font-family: inherit;
}

.btn-gravity:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(99,102,241,0.45);
}

.btn-gravity.active {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  animation: pulse-grav 1.2s ease-in-out infinite;
}

@keyframes pulse-grav {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
  50%       { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}

.stats-bar {
  display: flex;
  gap: 28px;
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  align-items: center;
  flex-wrap: wrap;
}

.stat { display: flex; align-items: center; gap: 5px; }
.stat strong { color: var(--text); font-weight: 600; }

.kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  font-family: monospace;
  color: var(--muted);
}

main { padding: 28px; }

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 18px;
}

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}

.no-results {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}

.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
  user-select: none;
}

.tool-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 20%, var(--card-accent-bg, rgba(79,142,247,0.06)), transparent 60%);
  pointer-events: none;
  border-radius: 16px;
}

.tool-card:hover {
  border-color: var(--card-accent, var(--accent));
  box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 0 1px var(--card-accent, var(--accent)) inset;
  transform: translateY(-3px);
}

.tool-dot {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px #22c55e;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.tool-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.tool-name { font-size: 15px; font-weight: 650; letter-spacing: -0.2px; }
.tool-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.tool-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }

.pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 9px;
  font-size: 11px;
  color: var(--muted);
  transition: all 0.15s;
  line-height: 1.5;
}

.tool-card:hover .pill {
  border-color: var(--card-accent, var(--accent));
  color: var(--card-accent, var(--accent));
}

#canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.6s;
}
#canvas.active { opacity: 1; }

.gravity-banner {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(99,102,241,0.95);
  backdrop-filter: blur(12px);
  color: white;
  border-radius: 30px;
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(99,102,241,0.4);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}

.gravity-banner.show { transform: translateX(-50%) translateY(0); }

.banner-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #86efac;
  box-shadow: 0 0 6px #86efac;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0.3; } }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 90%;
  max-width: 540px;
  max-height: 82vh;
  overflow-y: auto;
  padding: 26px;
  transform: scale(0.95);
  transition: transform 0.2s cubic-bezier(0.34,1.4,0.64,1);
}

.overlay.open .modal { transform: scale(1); }

.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 17px; font-weight: 700; }

.modal-x {
  background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1;
  padding: 2px 6px; border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.modal-x:hover { background: var(--surface2); color: var(--text); }

.modal-desc {
  font-size: 13px; color: var(--muted); line-height: 1.65;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.modal-section { margin-bottom: 18px; }

.modal-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px;
}

.cap-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.cap-item:last-child { border-bottom: none; }
.cap-icon { font-size: 15px; padding-top: 1px; flex-shrink: 0; }
.cap-name { font-size: 13px; font-weight: 500; font-family: monospace; }
.cap-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

.modal-pills { display: flex; flex-wrap: wrap; gap: 7px; }

.modal-pill {
  border-radius: 14px; padding: 5px 14px; font-size: 12px;
  font-weight: 500; cursor: default; border: 1px solid; transition: opacity 0.15s;
}
.modal-pill:hover { opacity: 0.8; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 700px) {
  header { padding: 12px 14px; }
  main { padding: 14px; }
  .tools-grid { grid-template-columns: 1fr; }
  .logo span { display: none; }
  .stats-bar { gap: 14px; padding: 8px 14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <span>HaMm3r's Unified Tool Hub</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search tools and capabilities… (press / to focus)" autocomplete="off">
  </div>
  <div class="header-actions">
    <button class="btn-gravity" id="gravBtn">⬆ Antigravity</button>
  </div>
</header>

<div class="stats-bar">

  <div class="stat">⚡ <strong>80+</strong>&nbsp;capabilities</div>
  <div class="stat">🟢 All systems connected</div>
  <div class="stat" style="margin-left:auto;"><kbd class="kbd">Ctrl+G</kbd> antigravity &nbsp;·&nbsp; <kbd class="kbd">/</kbd> search &nbsp;·&nbsp; <kbd class="kbd">Esc</kbd> exit</div>
</div>

<canvas id="canvas"></canvas>

<main>
  <div class="section-label">Connected Integrations</div>
  <div class="tools-grid" id="grid"></div>
</main>

<div class="gravity-banner" id="banner">
  <span class="banner-dot"></span>
  Antigravity active — drag cards &amp; move cursor to repel!
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-x" id="mClose">×</button>
    </div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="modal-section">
      <div class="modal-section-label">Capabilities</div>
      <div id="mCaps"></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Quick Actions</div>
      <div class="modal-pills" id="mPills"></div>
    </div>
  </div>
</div>

function render(q = '') {
  const grid = document.getElementById('grid');
  const lq = q.toLowerCase();
  const list = q ? TOOLS.filter(t =>
    t.name.toLowerCase().includes(lq) ||
    t.sub.toLowerCase().includes(lq) ||
    t.actions.some(a => a.toLowerCase().includes(lq)) ||
    t.caps.some(c => c.n.toLowerCase().includes(lq) || c.d.toLowerCase().includes(lq))
  ) : TOOLS;
  grid.innerHTML = list.length ? list.map(t => `
    <div class="tool-card" data-id="${t.id}"
         style="--card-accent:${t.color};--card-accent-bg:${t.bg};"
         onclick="openModal('${t.id}')">
      <div class="tool-dot"></div>
      <div class="tool-header">
        <div class="tool-icon" style="background:${t.bg}">${t.icon}</div>
        <div><div class="tool-name">${t.name}</div><div class="tool-sub">${t.sub}</div></div>
      </div>
      <div class="tool-pills">${t.actions.map(a=>`<span class="pill">${a}</span>`).join('')}</div>
    </div>
  `).join('') : '<div class="no-results">No tools match your search.</div>';
}

function openModal(id) {
  if (gravActive) return;
  const t = TOOLS.find(x => x.id === id); if (!t) return;
  document.getElementById('mTitle').textContent = t.icon + ' ' + t.name;
  document.getElementById('mDesc').textContent = t.sub + ' — ' + t.caps.length + ' capabilities connected and ready.';
  document.getElementById('mCaps').innerHTML = t.caps.map(c =>
    `<div class="cap-item"><span class="cap-icon">${c.i}</span><div><div class="cap-name">${c.n}</div><div class="cap-desc">${c.d}</div></div></div>`
  ).join('');
  document.getElementById('mPills').innerHTML = t.actions.map(a =>
    `<span class="modal-pill" style="background:${t.bg};color:${t.color};border-color:${t.color}40">${a}</span>`
  ).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('mClose').onclick = closeModal;
document.getElementById('overlay').onclick = e => { if (e.target === document.getElementById('overlay')) closeModal(); };
document.getElementById('search').addEventListener('input', e => render(e.target.value));

let gravActive = false, objs = [], parts = [], raf, canvas, ctx, dragging = null, mx = 0, my = 0;
const G = 0.07, DAMP = 0.996, BNC = 0.45;
const COLS = ['#4f8ef7','#a78bfa','#22c55e','#f59e0b','#ec4899','#00c4cc','#fb923c'];

function toggleGravity() {
  const btn = document.getElementById('gravBtn'), banner = document.getElementById('banner');
  gravActive = !gravActive;
  if (gravActive) { btn.classList.add('active'); btn.textContent = '⬇ Restore Gravity'; banner.classList.add('show'); launch(); }
  else { btn.classList.remove('active'); btn.textContent = '⬆ Antigravity'; banner.classList.remove('show'); land(); }
}
document.getElementById('gravBtn').onclick = toggleGravity;

function launch() {
  canvas = document.getElementById('canvas');
  canvas.width = innerWidth; canvas.height = innerHeight;
  ctx = canvas.getContext('2d'); canvas.classList.add('active');
  objs = [...document.querySelectorAll('.tool-card')].map(el => {
    const r = el.getBoundingClientRect();
    el.style.cssText += `;position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;margin:0;z-index:150;cursor:grab;transition:none;`;
    el.addEventListener('mousedown', startDrag);
    return { el, x:r.left, y:r.top, w:r.width, h:r.height, vx:(Math.random()-.5)*2, vy:-(Math.random()*3+1), rot:0, rotV:(Math.random()-.5)*0.4 };
  });
  document.getElementById('grid').style.visibility = 'hidden';
  for(let i=0;i<80;i++) parts.push(newP());
  window.addEventListener('mousemove', trackMouse);
  window.addEventListener('mouseup', stopDrag);
  window.addEventListener('resize', () => { canvas.width=innerWidth; canvas.height=innerHeight; });
  loop();
}

function land() {
  cancelAnimationFrame(raf); canvas.classList.remove('active');
  objs.forEach(o => {
    o.el.style.cssText = o.el.style.cssText
      .replace(/position:[^;]+;/g,'').replace(/left:[^;]+;/g,'').replace(/top:[^;]+;/g,'')
      .replace(/width:[^;]+;/g,'').replace(/margin:[^;]+;/g,'').replace(/z-index:[^;]+;/g,'')
      .replace(/cursor:[^;]+;/g,'').replace(/transition:[^;]+;/g,'');
    o.el.style.transform = ''; o.el.removeEventListener('mousedown', startDrag);
  });
  document.getElementById('grid').style.visibility = '';
  window.removeEventListener('mousemove', trackMouse); window.removeEventListener('mouseup', stopDrag);
  objs = []; parts = [];
}

function newP() { return { x:Math.random()*innerWidth, y:innerHeight+Math.random()*60, vx:(Math.random()-.5)*1.5, vy:-(Math.random()*2+0.4), r:Math.random()*3+1, op:Math.random()*.7+.2, life:0, col:COLS[Math.floor(Math.random()*COLS.length)] }; }
function trackMouse(e) { mx=e.clientX; my=e.clientY; }
function startDrag(e) { const o=objs.find(x=>x.el===e.currentTarget); if(!o) return; dragging=o; o._dx=e.clientX-o.x; o._dy=e.clientY-o.y; o.el.style.cursor='grabbing'; e.preventDefault(); }
function stopDrag() { if(dragging){dragging.el.style.cursor='grab';dragging=null;} }

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W=innerWidth, H=innerHeight;
  parts.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life=Math.min(1,p.life+0.006);
    if(p.y<-20) parts[i]=newP();
    const a=Math.sin(p.life*Math.PI)*p.op; if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=p.col; ctx.shadowBlur=10; ctx.shadowColor=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
  if(Math.random()<.25&&parts.length<150) parts.push(newP());
  objs.forEach(o=>{
    if(dragging===o){ const px=o.x,py=o.y; o.x=mx-o._dx; o.y=my-o._dy; o.vx=(o.x-px)*.8; o.vy=(o.y-py)*.8; }
    else {
      o.vy-=G; o.vx*=DAMP; o.vy*=DAMP;
      const dx=(o.x+o.w/2)-mx, dy=(o.y+o.h/2)-my, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<220&&dist>1){const f=((220-dist)/220)*.6; o.vx+=(dx/dist)*f; o.vy+=(dy/dist)*f;}
      o.x+=o.vx; o.y+=o.vy; o.rot+=o.rotV;
      if(o.x<0){o.x=0;o.vx*=-BNC;} if(o.x+o.w>W){o.x=W-o.w;o.vx*=-BNC;}
      if(o.y+o.h<-60){o.y=H+10;o.vx=(Math.random()-.5)*2;o.vy=-(Math.random()*3+1);o.rot=0;}
      if(o.y>H+60){o.y=-o.h-10;}
    }
    o.el.style.left=o.x+'px'; o.el.style.top=o.y+'px'; o.el.style.transform=`rotate(${o.rot}deg)`;
  });
  raf=requestAnimationFrame(loop);
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){closeModal();if(gravActive)toggleGravity();}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='g'){e.preventDefault();toggleGravity();}
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('search').focus();}
});

render();
</script>
</body>
</html>
