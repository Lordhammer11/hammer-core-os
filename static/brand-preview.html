<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #09090f;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 72px 40px 120px;
				gap: 80px;
				font-family: 'Inter', sans-serif;
			}
			.section {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 20px;
			}
			.label {
				font-size: 9.5px;
				font-weight: 600;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.18);
			}

			/* ── ICON CARD ── */
			.icon-card {
				width: 152px;
				height: 152px;
				background: #0d1022;
				border-radius: 36px;
				border: 1px solid rgba(0, 200, 255, 0.08);
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				overflow: hidden;
				box-shadow:
					0 0 0 1px rgba(0, 200, 255, 0.04),
					0 0 60px rgba(0, 200, 255, 0.08),
					inset 0 1px 0 rgba(255, 255, 255, 0.03);
			}
			.icon-card::after {
				content: '';
				position: absolute;
				inset: 0;
				border-radius: 36px;
				background: repeating-linear-gradient(
					0deg,
					transparent,
					transparent 3px,
					rgba(0, 0, 0, 0.06) 3px,
					rgba(0, 0, 0, 0.06) 4px
				);
				pointer-events: none;
			}

			/* ── WORDMARK ── */
			.wordmark {
				display: flex;
				align-items: center;
				gap: 18px;
				background: #0d1022;
				border: 1px solid rgba(255, 255, 255, 0.04);
				border-top: 1px solid rgba(0, 200, 255, 0.12);
				border-radius: 18px;
				padding: 20px 32px;
				box-shadow: 0 0 40px rgba(0, 200, 255, 0.05);
				position: relative;
				overflow: hidden;
			}
			.wordmark::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 1px;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(0, 200, 255, 0.45),
					rgba(129, 140, 248, 0.3),
					transparent
				);
			}
			.wm-text {
				display: flex;
				flex-direction: column;
				gap: 5px;
			}
			.wm-title {
				font-size: 28px;
				font-weight: 800;
				letter-spacing: -0.03em;
				line-height: 1;
				font-style: italic;
			}
			.w {
				color: #e2e8f0;
			}
			.c {
				color: #00ccff;
			} /* lightning blue */
			.o {
				color: #60a5fa;
			} /* softer cornflower */
			.g {
				color: #a78bfa;
			} /* electric violet */
			.wm-sub {
				font-size: 9px;
				font-weight: 600;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				color: #94a3b8; /* bright matte gray */
			}

			/* ── SPLASH ── */
			.splash {
				width: 520px;
				height: 320px;
				background: #0d1022;
				border-radius: 24px;
				border: 1px solid rgba(255, 255, 255, 0.04);
				border-top: 1px solid rgba(0, 200, 255, 0.1);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				position: relative;
				overflow: hidden;
				box-shadow:
					0 0 80px rgba(0, 200, 255, 0.06),
					0 0 40px rgba(167, 139, 250, 0.04);
			}
			.splash::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 1px;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(0, 200, 255, 0.5),
					rgba(167, 139, 250, 0.4),
					transparent
				);
			}
			.splash-title {
				font-size: 44px;
				font-weight: 900;
				font-style: italic;
				letter-spacing: -0.04em;
				line-height: 1;
				position: relative;
				z-index: 1;
			}
			.splash-divider {
				width: 56px;
				height: 1px;
				background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.5), transparent);
				position: relative;
				z-index: 1;
			}
			.splash-sub {
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				color: #94a3b8; /* bright matte gray */
				position: relative;
				z-index: 1;
			}

			/* ── SIDEBAR ── */
			.sidebar {
				width: 280px;
				background: #0d1022;
				border: 1px solid rgba(255, 255, 255, 0.04);
				border-left: 2px solid rgba(0, 200, 255, 0.22);
				border-radius: 14px;
				padding: 14px 18px;
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.sb-text {
				display: flex;
				flex-direction: column;
				gap: 3px;
			}
			.sb-name {
				font-size: 16px;
				font-weight: 800;
				font-style: italic;
				letter-spacing: -0.02em;
				line-height: 1;
			}
			.sb-tag {
				font-size: 9px;
				font-weight: 600;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: #94a3b8; /* bright matte gray */
			}
		</style>
	</head>
	<body>
		<!-- ══════════════ ICON MARK ══════════════ -->
		<div class="section">
			<div class="label">Icon Mark — Möbius Strip</div>
			<div class="icon-card">
				<svg width="108" height="108" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
					<defs>
						<!-- Holographic gradient: lightning blue → violet → back to cyan -->
						<linearGradient
							id="holoFront"
							x1="12"
							y1="0"
							x2="88"
							y2="0"
							gradientUnits="userSpaceOnUse"
						>
							<stop offset="0%" stop-color="#00FFFF" stop-opacity="0.88" />
							<stop offset="18%" stop-color="#00C8FF" stop-opacity="0.92" />
							<stop offset="38%" stop-color="#3B82F6" stop-opacity="0.90" />
							<stop offset="58%" stop-color="#818CF8" stop-opacity="0.88" />
							<stop offset="78%" stop-color="#A78BFA" stop-opacity="0.85" />
							<stop offset="100%" stop-color="#22D3EE" stop-opacity="0.88" />
						</linearGradient>

						<!-- Back face gradient: deeper, darker shift -->
						<linearGradient
							id="holoBack"
							x1="12"
							y1="0"
							x2="88"
							y2="0"
							gradientUnits="userSpaceOnUse"
						>
							<stop offset="0%" stop-color="#0060AA" stop-opacity="0.85" />
							<stop offset="40%" stop-color="#1840A8" stop-opacity="0.85" />
							<stop offset="70%" stop-color="#4030A0" stop-opacity="0.82" />
							<stop offset="100%" stop-color="#0060AA" stop-opacity="0.85" />
						</linearGradient>

						<!-- Edge glow gradient -->
						<linearGradient
							id="holoEdge"
							x1="12"
							y1="0"
							x2="88"
							y2="0"
							gradientUnits="userSpaceOnUse"
						>
							<stop offset="0%" stop-color="#80FFFF" />
							<stop offset="30%" stop-color="#38E8FF" />
							<stop offset="60%" stop-color="#A0B4FF" />
							<stop offset="100%" stop-color="#80FFFF" />
						</linearGradient>

						<!-- Soft glow filter -->
						<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
							<feGaussianBlur stdDeviation="2.2" result="b" />
							<feMerge>
								<feMergeNode in="b" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>

						<!-- Big ambient glow -->
						<filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
							<feGaussianBlur stdDeviation="9" result="b" />
							<feMerge>
								<feMergeNode in="b" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>

						<!-- Clip for the right twist occlusion -->
						<clipPath id="frontClip">
							<rect x="0" y="0" width="82" height="108" />
						</clipPath>
					</defs>

					<!-- ── AMBIENT HAZE ── -->
					<ellipse
						cx="54"
						cy="54"
						rx="44"
						ry="26"
						fill="#0088CC"
						opacity="0.09"
						filter="url(#bigGlow)"
					/>

					<!-- ═══════════════════════════════════════
           MÖBIUS STRIP
           Layout: loop runs L→R, twist on right side
           Back arc = bottom half (behind, transparent)
           Front arc = top half (front, brighter)
           Twist = right side crossing, shows the half-flip
      ════════════════════════════════════════ -->

					<!-- ── [1] BACK LOWER ARC (rendered first, sits behind) ── -->
					<!-- Center spine: M 14,55 C 14,78 82,78 82,55 -->
					<path
						d="M 14,55 C 14,78 82,78 82,55"
						fill="none"
						stroke="url(#holoBack)"
						stroke-width="20"
						stroke-linecap="round"
						opacity="0.38"
					/>

					<!-- Back arc outer edge line (the far edge seen through) -->
					<path
						d="M 14,58 C 14,82 82,82 82,58"
						fill="none"
						stroke="#2050B8"
						stroke-width="1.4"
						stroke-linecap="round"
						opacity="0.28"
					/>

					<!-- ── [2] LEFT END CAP ── smoothly connects back arc to front arc -->
					<!-- A rounded C-shape on the far left, showing the strip curling around -->
					<path
						d="M 14,43 C 4,43 4,65 14,65"
						fill="none"
						stroke="url(#holoFront)"
						stroke-width="18"
						stroke-linecap="butt"
						opacity="0.50"
					/>

					<!-- Left cap inner highlight -->
					<path
						d="M 14,45 C 6,45 6,63 14,63"
						fill="none"
						stroke="#80F0FF"
						stroke-width="1.2"
						stroke-linecap="butt"
						opacity="0.45"
						filter="url(#glow)"
					/>

					<!-- ── [3] FRONT UPPER ARC (the bright face) ── -->
					<!-- Center spine: M 14,53 C 14,24 82,24 82,53 -->
					<path
						d="M 14,53 C 14,24 82,24 82,53"
						fill="none"
						stroke="url(#holoFront)"
						stroke-width="20"
						stroke-linecap="round"
						opacity="0.68"
					/>

					<!-- Front arc top edge glow (bright highlight along the crest) -->
					<path
						d="M 16,50 C 16,22 82,22 82,50"
						fill="none"
						stroke="url(#holoEdge)"
						stroke-width="1.6"
						stroke-linecap="round"
						opacity="0.65"
						filter="url(#glow)"
					/>

					<!-- Front arc inner edge (subtle lower edge of front face) -->
					<path
						d="M 16,56 C 16,30 82,30 82,56"
						fill="none"
						stroke="#6080D8"
						stroke-width="0.9"
						stroke-linecap="round"
						opacity="0.30"
					/>

					<!-- ── [4] RIGHT SIDE TWIST ── where the Möbius half-turn happens ── -->

					<!-- First: erase the back arc right end to create the "goes behind" illusion -->
					<!-- Dark cover patch over the back arc endpoint -->
					<path
						d="M 78,50 C 86,52 88,58 82,63 C 78,67 76,65 77,58 Z"
						fill="#09090F"
						opacity="0.80"
					/>

					<!-- The twist zone: a tapered band that rotates 180° -->
					<!-- Upper ribbon of twist (front side, coming from front arc) -->
					<path
						d="M 82,44 C 90,46 92,58 82,64"
						fill="none"
						stroke="url(#holoFront)"
						stroke-width="14"
						stroke-linecap="round"
						opacity="0.56"
					/>

					<!-- Twist upper highlight edge -->
					<path
						d="M 82,42 C 91,44 93,57 82,63"
						fill="none"
						stroke="#60F0FF"
						stroke-width="1.5"
						stroke-linecap="round"
						opacity="0.70"
						filter="url(#glow)"
					/>

					<!-- The diagonal crossing lines that make it READ as a Möbius twist -->
					<!-- Front diagonal (bright, over the top) -->
					<line
						x1="79"
						y1="41"
						x2="88"
						y2="60"
						stroke="#22E8FF"
						stroke-width="1.8"
						stroke-linecap="round"
						opacity="0.72"
						filter="url(#glow)"
					/>

					<!-- Back diagonal (dimmer, going behind) -->
					<line
						x1="79"
						y1="62"
						x2="88"
						y2="43"
						stroke="#4040C0"
						stroke-width="1.4"
						stroke-linecap="round"
						opacity="0.38"
					/>

					<!-- Small gap to reinforce "front goes over back" at the crossing -->
					<path
						d="M 82,51 C 85,53 85,56 82,58"
						fill="none"
						stroke="#09090F"
						stroke-width="4"
						opacity="0.88"
					/>

					<!-- Re-draw front edge OVER that gap (the part that "crosses over") -->
					<path
						d="M 82,49 C 86,51 86,56 82,59"
						fill="none"
						stroke="#38E8FF"
						stroke-width="2.0"
						stroke-linecap="round"
						opacity="0.80"
						filter="url(#glow)"
					/>

					<!-- ── [5] HOLOGRAPHIC SHIMMER SPECKS ── -->
					<circle cx="30" cy="34" r="1.3" fill="#A0F8FF" opacity="0.45" />
					<circle cx="54" cy="28" r="1.0" fill="#A78BFA" opacity="0.40" />
					<circle cx="72" cy="32" r="1.2" fill="#22E4FF" opacity="0.38" />
					<circle cx="24" cy="72" r="1.0" fill="#38BFFF" opacity="0.30" />
					<circle cx="62" cy="76" r="1.2" fill="#818CF8" opacity="0.28" />
					<circle cx="42" cy="30" r="0.7" fill="#FFFFFF" opacity="0.20" />

					<!-- ── [6] HUD CORNER BRACKETS ── -->
					<path
						d="M14,18 L14,12 L20,12"
						fill="none"
						stroke="#22D3EE"
						stroke-width="1.1"
						opacity="0.32"
					/>
					<path
						d="M88,12 L94,12 L94,18"
						fill="none"
						stroke="#A78BFA"
						stroke-width="1.1"
						opacity="0.32"
					/>
					<path
						d="M14,90 L14,96 L20,96"
						fill="none"
						stroke="#22D3EE"
						stroke-width="1.1"
						opacity="0.20"
					/>
					<path
						d="M88,96 L94,96 L94,90"
						fill="none"
						stroke="#A78BFA"
						stroke-width="1.1"
						opacity="0.20"
					/>
				</svg>
			</div>
		</div>

		<!-- ══════════════ WORDMARK ══════════════ -->
		<div class="section">
			<div class="label">Wordmark</div>
			<div class="wordmark">
				<!-- mini Möbius -->
				<svg width="46" height="46" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
					<defs>
						<linearGradient id="mh1" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
							<stop offset="0%" stop-color="#00FFFF" stop-opacity="0.88" />
							<stop offset="35%" stop-color="#3B82F6" stop-opacity="0.90" />
							<stop offset="65%" stop-color="#A78BFA" stop-opacity="0.85" />
							<stop offset="100%" stop-color="#22D3EE" stop-opacity="0.88" />
						</linearGradient>
						<linearGradient id="mh2" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
							<stop offset="0%" stop-color="#0060AA" stop-opacity="0.85" />
							<stop offset="100%" stop-color="#4030A0" stop-opacity="0.82" />
						</linearGradient>
						<filter id="mg">
							<feGaussianBlur stdDeviation="2" result="b" />
							<feMerge>
								<feMergeNode in="b" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>
					</defs>
					<path
						d="M 14,55 C 14,78 82,78 82,55"
						fill="none"
						stroke="url(#mh2)"
						stroke-width="20"
						stroke-linecap="round"
						opacity="0.36"
					/>
					<path
						d="M 14,43 C 4,43 4,65 14,65"
						fill="none"
						stroke="url(#mh1)"
						stroke-width="18"
						stroke-linecap="butt"
						opacity="0.50"
					/>
					<path
						d="M 14,53 C 14,24 82,24 82,53"
						fill="none"
						stroke="url(#mh1)"
						stroke-width="20"
						stroke-linecap="round"
						opacity="0.66"
					/>
					<path
						d="M 16,50 C 16,22 82,22 82,50"
						fill="none"
						stroke="#80F0FF"
						stroke-width="1.5"
						stroke-linecap="round"
						opacity="0.60"
						filter="url(#mg)"
					/>
					<path
						d="M 82,42 C 91,44 93,57 82,63"
						fill="none"
						stroke="url(#mh1)"
						stroke-width="14"
						stroke-linecap="round"
						opacity="0.54"
					/>
					<line
						x1="79"
						y1="41"
						x2="88"
						y2="60"
						stroke="#22E8FF"
						stroke-width="1.8"
						stroke-linecap="round"
						opacity="0.70"
						filter="url(#mg)"
					/>
					<line
						x1="79"
						y1="62"
						x2="88"
						y2="43"
						stroke="#4040C0"
						stroke-width="1.2"
						stroke-linecap="round"
						opacity="0.35"
					/>
					<path
						d="M 82,51 C 85,53 85,56 82,58"
						fill="none"
						stroke="#09090F"
						stroke-width="4"
						opacity="0.88"
					/>
					<path
						d="M 82,49 C 86,51 86,56 82,59"
						fill="none"
						stroke="#38E8FF"
						stroke-width="1.8"
						stroke-linecap="round"
						opacity="0.78"
						filter="url(#mg)"
					/>
				</svg>

				<div class="wm-text">
					<div class="wm-title">
						<span class="w">Ha</span><span class="c">M</span><span class="o">m</span
						><span class="g">3</span><span class="w">r's</span>
					</div>
					<div class="wm-sub">Agent Operating System</div>
				</div>
			</div>
		</div>

		<!-- ══════════════ SPLASH ══════════════ -->
		<div class="section">
			<div class="label">Splash Screen</div>
			<div class="splash">
				<!-- grid bg -->
				<svg
					style="position: absolute; inset: 0; border-radius: 24px; opacity: 0.035"
					width="520"
					height="320"
					viewBox="0 0 520 320"
				>
					<defs>
						<linearGradient id="gf" x1="0%" y1="0%" x2="0%" y2="100%">
							<stop offset="0%" stop-color="#00C8FF" stop-opacity="0.8" />
							<stop offset="100%" stop-color="#00C8FF" stop-opacity="0" />
						</linearGradient>
					</defs>
					<g stroke="url(#gf)" stroke-width="0.8">
						<line x1="0" y1="80" x2="520" y2="80" />
						<line x1="0" y1="160" x2="520" y2="160" />
						<line x1="0" y1="240" x2="520" y2="240" />
						<line x1="104" y1="0" x2="104" y2="320" />
						<line x1="208" y1="0" x2="208" y2="320" />
						<line x1="312" y1="0" x2="312" y2="320" />
						<line x1="416" y1="0" x2="416" y2="320" />
					</g>
				</svg>

				<!-- Möbius icon centered -->
				<svg
					width="90"
					height="90"
					viewBox="0 0 108 108"
					xmlns="http://www.w3.org/2000/svg"
					style="position: relative; z-index: 1"
				>
					<defs>
						<linearGradient id="sh1" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
							<stop offset="0%" stop-color="#00FFFF" stop-opacity="0.88" />
							<stop offset="30%" stop-color="#00C8FF" stop-opacity="0.92" />
							<stop offset="55%" stop-color="#818CF8" stop-opacity="0.88" />
							<stop offset="80%" stop-color="#A78BFA" stop-opacity="0.85" />
							<stop offset="100%" stop-color="#22D3EE" stop-opacity="0.88" />
						</linearGradient>
						<linearGradient id="sh2" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
							<stop offset="0%" stop-color="#0060AA" stop-opacity="0.85" />
							<stop offset="100%" stop-color="#4030A0" stop-opacity="0.82" />
						</linearGradient>
						<filter id="sg">
							<feGaussianBlur stdDeviation="2.8" result="b" />
							<feMerge>
								<feMergeNode in="b" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>
						<filter id="sbg">
							<feGaussianBlur stdDeviation="9" result="b" />
							<feMerge>
								<feMergeNode in="b" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>
					</defs>
					<ellipse
						cx="54"
						cy="54"
						rx="44"
						ry="26"
						fill="#0088CC"
						opacity="0.10"
